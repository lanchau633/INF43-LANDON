<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MapMates</title>
<style>
@font-face {
  font-family: 'Nunito';
  src: url('fonts/Nunito-VariableFont_wght.ttf') format('truetype-variations');
  font-weight: 200 900; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Nunito';
  src: url('fonts/Nunito-Italic-VariableFont_wght.ttf') format('truetype-variations');
  font-weight: 200 900; font-style: italic; font-display: swap;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100vh;
  background: #0B1628;
  font-family: 'Nunito', ui-sans-serif, system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  color: #0F1B36;
}
button { font-family: inherit; }
input, textarea { font-family: inherit; }
:root {
  --mm-blue-50:  #EAF1FB; --mm-blue-100: #D7E2F2; --mm-blue-200: #B7C7E4;
  --mm-blue-300: #6E97D8; --mm-blue-400: #3672D4; --mm-blue-500: #2563EB;
  --mm-blue-600: #1E55C7; --mm-blue-700: #143F99;
  --mm-coral-50: #FFF1EE; --mm-coral-100: #FCDBD4; --mm-coral-500: #F87060; --mm-coral-600: #E2594A;
  --mm-ink: #0F1B36; --mm-ink-2: #4A5773; --mm-ink-3: #8794AE; --mm-line: #E4EAF2;
  --mm-ease-spring: cubic-bezier(.22,1.2,.36,1);
  --mm-ease-standard: cubic-bezier(.4,0,.2,1);
}
@keyframes mm-pulse      { 0%{transform:scale(.8);opacity:.7} 80%,100%{transform:scale(1.4);opacity:0} }
@keyframes mm-self-pulse { 0%{transform:scale(.6);opacity:.85} 80%,100%{transform:scale(1.6);opacity:0} }
@keyframes mm-sheet-up   { from{transform:translateY(24px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes mm-fade-in    { from{opacity:0} to{opacity:1} }
@keyframes mm-scale-in   { from{transform:scale(.92);opacity:0} to{transform:scale(1);opacity:1} }
@keyframes mm-slide-up   { from{transform:translateY(100%)} to{transform:translateY(0)} }
@keyframes mm-fab-pop    { 0%{transform:scale(0) rotate(-45deg);opacity:0} 60%{transform:scale(1.1) rotate(5deg)} 100%{transform:scale(1) rotate(0deg);opacity:1} }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
  integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
  crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
  integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
  crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
  integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
  crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ── Icon factory ─────────────────────────────────────────────
const I = (path) =>
  function Icon({ size = 22, color = 'currentColor', strokeWidth = 2, style = {} }) {
    return (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color}
        strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"
        style={{ display: 'block', flexShrink: 0, ...style }}>
        {path}
      </svg>
    );
  };

const IconSearch     = I(<><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></>);
const IconBell       = I(<><path d="M6 8a6 6 0 0 1 12 0c0 5 2 6 2 8H4c0-2 2-3 2-8Z"/><path d="M10 19a2 2 0 0 0 4 0"/></>);
const IconUserCircle = I(<><circle cx="12" cy="12" r="9"/><circle cx="12" cy="10" r="3"/><path d="M5.5 18.5C7 16 9.3 14.5 12 14.5s5 1.5 6.5 4"/></>);
const IconMap        = I(<><path d="M9 3 3 5v16l6-2 6 2 6-2V3l-6 2-6-2Z"/><path d="M9 3v16M15 5v16"/></>);
const IconUsers      = I(<><circle cx="9" cy="9" r="3.5"/><path d="M2.5 19c.6-3 3.4-5 6.5-5s5.9 2 6.5 5"/><circle cx="17" cy="8" r="2.8"/><path d="M16 14c2.6 0 4.7 1.6 5.5 4"/></>);
const IconCalendar   = I(<><rect x="3.5" y="5" width="17" height="16" rx="2.5"/><path d="M3.5 10h17M8 3v4M16 3v4"/></>);
const IconUser       = I(<><circle cx="12" cy="8" r="4"/><path d="M4 21c.8-4.5 4-7 8-7s7.2 2.5 8 7"/></>);
const IconClose      = I(<><path d="M6 6l12 12M18 6L6 18"/></>);
const IconChevronLeft= I(<><path d="M15 5l-7 7 7 7"/></>);
const IconCheck      = I(<><path d="M5 12.5l4.5 4.5L19 7"/></>);
const IconShield     = I(<><path d="M12 3l8 3v6c0 5-3.6 8.3-8 9-4.4-.7-8-4-8-9V6l8-3Z"/><path d="M9 12l2 2 4-4"/></>);
const IconPin        = I(<><path d="M12 21s7-6.5 7-12a7 7 0 1 0-14 0c0 5.5 7 12 7 12Z"/><circle cx="12" cy="9" r="2.5"/></>);
const IconMusic      = I(<><path d="M9 18V5l11-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="17" cy="16" r="3"/></>);
const IconMessage    = I(<><path d="M4 5h16v11H8l-4 4V5Z"/></>);
const IconCamera     = I(<><path d="M4 7h3l2-2h6l2 2h3v12H4V7Z"/><circle cx="12" cy="13" r="4"/></>);
const IconPlus       = I(<><path d="M12 5v14M5 12h14"/></>);
const IconStatus     = I(<><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="7" strokeOpacity="0.45"/><circle cx="12" cy="12" r="11" strokeOpacity="0.18"/></>);
const IconArrowRight = I(<><path d="M5 12h14M13 6l6 6-6 6"/></>);
const IconEdit       = I(<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/></>);
const IconMap2       = I(<><path d="M9 3 3 5v16l6-2 6 2 6-2V3l-6 2-6-2Z"/><path d="M9 3v16M15 5v16"/></>);

// ── Logo ─────────────────────────────────────────────────────
function PinMark({ size = 64, shadow = true }) {
  return (
    <svg width={size} height={size * 1.2} viewBox="0 0 100 120" fill="none"
      style={{ filter: shadow ? 'drop-shadow(0 6px 10px rgba(15,27,54,0.22))' : 'none', display: 'block' }}>
      <path d="M50 4C73.2 4 92 22.8 92 46C92 76 60 110 50 116C40 110 8 76 8 46C8 22.8 26.8 4 50 4Z" fill="#2563EB"/>
      <circle cx="50" cy="46" r="28" fill="#FFFFFF"/>
      <circle cx="42" cy="38" r="7" fill="#2563EB"/>
      <circle cx="56" cy="40" r="7" fill="#F87060"/>
      <path d="M36 64C36 56 42 50 50 50C58 50 64 56 64 64Z" fill="#F87060"/>
    </svg>
  );
}
function Wordmark({ size = 24, color }) {
  return (
    <span style={{ fontWeight: 800, fontSize: size, letterSpacing: '-0.02em', lineHeight: 1, display: 'inline-flex' }}>
      <span style={{ color: color || '#2563EB' }}>Map</span>
      <span style={{ color: color || '#F87060' }}>Mates</span>
    </span>
  );
}
function LogoLockup({ pinSize = 88 }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14 }}>
      <PinMark size={pinSize}/><Wordmark size={pinSize * 0.34}/>
    </div>
  );
}

// ── Map Background ───────────────────────────────────────────
function MapBackground({ onPointerDown, onPointerMove, onPointerUp, mapRef }) {
  return (
    <div ref={mapRef}
      onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp}
      style={{ position: 'absolute', inset: 0, overflow: 'hidden', background: '#EAF1FB', cursor: 'crosshair', userSelect: 'none', touchAction: 'none' }}>
      <svg width="100%" height="100%" viewBox="0 0 360 600" preserveAspectRatio="xMidYMid slice"
        style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
        <g fill="#D7E2F2">
          <rect x="-20" y="-10" width="120" height="90" rx="6"/>
          <rect x="115" y="-10" width="80" height="60" rx="6"/>
          <rect x="210" y="-10" width="170" height="90" rx="6"/>
          <rect x="-20" y="95" width="80" height="100" rx="6"/>
          <rect x="75" y="65" width="120" height="130" rx="6"/>
          <rect x="210" y="95" width="100" height="60" rx="6"/>
          <rect x="325" y="95" width="60" height="160" rx="6"/>
          <rect x="-20" y="210" width="80" height="120" rx="6"/>
          <rect x="75" y="210" width="60" height="60" rx="6"/>
          <rect x="150" y="210" width="80" height="100" rx="6"/>
          <rect x="245" y="170" width="65" height="90" rx="6"/>
          <rect x="-20" y="345" width="60" height="100" rx="6"/>
          <rect x="55" y="285" width="100" height="160" rx="6"/>
          <rect x="170" y="325" width="120" height="120" rx="6"/>
          <rect x="305" y="270" width="80" height="175" rx="6"/>
          <rect x="-20" y="460" width="140" height="160" rx="6"/>
          <rect x="135" y="460" width="120" height="160" rx="6"/>
          <rect x="270" y="460" width="115" height="160" rx="6"/>
        </g>
      </svg>
    </div>
  );
}

// ── Pins ─────────────────────────────────────────────────────
function AvatarPin({ initials = 'LJ', tone = 'blue', size = 36 }) {
  const bg = tone === 'coral' ? '#F87060' : '#2563EB';
  return (
    <div style={{ width: size, height: size, borderRadius: '50%', background: bg, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: size * 0.36, letterSpacing: '0.02em', border: '2.5px solid #fff', boxShadow: '0 4px 8px rgba(15,27,54,0.18)', flexShrink: 0 }}>
      {initials}
    </div>
  );
}
function EventPin({ icon: Icon, label, tone = 'coral', onClick }) {
  const bg = tone === 'blue' ? '#2563EB' : '#F87060';
  return (
    <div onClick={onClick} style={{ display: 'inline-flex', flexDirection: 'column', alignItems: 'center', gap: 4, cursor: onClick ? 'pointer' : 'default' }}>
      <div style={{ position: 'relative', width: 36, height: 44, filter: 'drop-shadow(0 4px 6px rgba(15,27,54,0.22))' }}>
        <svg width="36" height="44" viewBox="0 0 36 44" fill="none">
          <path d="M18 1.5C26.8 1.5 34 8.7 34 17.5C34 28 22 41 18 43C14 41 2 28 2 17.5C2 8.7 9.2 1.5 18 1.5Z" fill={bg} stroke="#fff" strokeWidth="2.5"/>
        </svg>
        <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'flex-start', justifyContent: 'center', paddingTop: 9 }}>
          {Icon && <Icon size={16} color="#fff" strokeWidth={2.4}/>}
        </div>
      </div>
      {label && <div style={{ background: '#2563EB', color: '#fff', padding: '4px 10px', borderRadius: 999, fontWeight: 700, fontSize: 12, lineHeight: 1.2, boxShadow: '0 2px 4px rgba(15,27,54,0.18)', whiteSpace: 'nowrap' }}>{label}</div>}
    </div>
  );
}
function StatusPin({ initials, tone = 'blue', size = 38 }) {
  const ring = tone === 'coral' ? 'rgba(248,112,96,0.35)' : 'rgba(37,99,235,0.35)';
  return (
    <div style={{ position: 'relative', width: size + 18, height: size + 18 }}>
      <span style={{ position: 'absolute', inset: 0, borderRadius: '50%', background: ring, animation: 'mm-pulse 1.6s ease-out infinite' }}/>
      <div style={{ position: 'absolute', inset: 9 }}><AvatarPin initials={initials} tone={tone} size={size}/></div>
    </div>
  );
}
function SelfMarker() {
  return (
    <div style={{ position: 'relative', width: 56, height: 56 }}>
      <span style={{ position: 'absolute', inset: 0, borderRadius: '50%', background: 'rgba(37,99,235,0.18)', animation: 'mm-self-pulse 2.2s ease-out infinite' }}/>
      <span style={{ position: 'absolute', inset: 8, borderRadius: '50%', background: 'rgba(37,99,235,0.28)', animation: 'mm-self-pulse 2.2s ease-out infinite .6s' }}/>
      <div style={{ position: 'absolute', inset: 18, width: 20, height: 20, borderRadius: '50%', background: '#2563EB', border: '3px solid #fff', boxShadow: '0 2px 6px rgba(15,27,54,0.30)', display: 'grid', placeItems: 'center', color: '#fff', fontSize: 8, fontWeight: 800 }}>ME</div>
    </div>
  );
}

// ── iOS Frame ────────────────────────────────────────────────
function IOSStatusBar({ dark = false }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 24px 8px', position: 'relative', zIndex: 20, flexShrink: 0 }}>
      <span style={{ fontFamily: '-apple-system,system-ui', fontWeight: 600, fontSize: 16, color: c, letterSpacing: '-0.3px' }}>9:41</span>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="25" height="12" viewBox="0 0 25 12">
          <rect x="0.5" y="0.5" width="22" height="11" rx="3" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="18" height="8" rx="2" fill={c}/>
          <path d="M24 4v4c.8-.3 1.5-1.1 1.5-2s-.7-1.7-1.5-2z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}
function IOSDevice({ children }) {
  return (
    <div style={{ width: 360, height: 780, borderRadius: 50, overflow: 'hidden', position: 'relative', background: '#F2F2F7', boxShadow: '0 48px 96px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.14)', flexShrink: 0 }}>
      <div style={{ position: 'absolute', top: 12, left: '50%', transform: 'translateX(-50%)', width: 120, height: 34, borderRadius: 20, background: '#000', zIndex: 50 }}/>
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>{children}</div>
      <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end', paddingBottom: 8, pointerEvents: 'none', zIndex: 60 }}>
        <div style={{ width: 130, height: 5, borderRadius: 100, background: 'rgba(0,0,0,0.25)' }}/>
      </div>
    </div>
  );
}

// ── Shared Components ────────────────────────────────────────
// fix 1: onNotif wired in all header instances
function Header({ onBell, onProfile, hasNotif = false, dark = true }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 18px 12px', background: dark ? '#2563EB' : 'transparent', color: dark ? '#fff' : '#0F1B36', flexShrink: 0 }}>
      <Wordmark size={19} color={dark ? '#fff' : undefined}/>
      <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
        <button onClick={onBell} aria-label="Notifications" style={{ background: 'none', border: 'none', cursor: 'pointer', position: 'relative', padding: 4, display: 'grid', placeItems: 'center' }}>
          <IconBell size={20} color={dark ? '#fff' : '#0F1B36'}/>
          {hasNotif && <span style={{ position: 'absolute', top: 2, right: 2, width: 8, height: 8, borderRadius: '50%', background: '#F87060', border: '1.5px solid ' + (dark ? '#2563EB' : '#fff') }}/>}
        </button>
        <button onClick={onProfile} aria-label="Profile" style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, display: 'grid', placeItems: 'center' }}>
          <IconUserCircle size={22} color={dark ? '#fff' : '#0F1B36'}/>
        </button>
      </div>
    </div>
  );
}

function SearchBar({ placeholder = 'Search nearby…', value, onChange, style = {} }) {
  const [internal, setInternal] = useState('');
  const controlled = value !== undefined;
  const v = controlled ? value : internal;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '11px 14px', background: '#fff', borderRadius: 999, boxShadow: '0 2px 10px rgba(15,27,54,0.08)', ...style }}>
      <IconSearch size={17} color="#2563EB" strokeWidth={2.5}/>
      <input value={v} onChange={(e) => { if (!controlled) setInternal(e.target.value); onChange?.(e); }} placeholder={placeholder}
        style={{ border: 'none', outline: 'none', background: 'transparent', fontSize: 15, color: '#0F1B36', flex: 1, fontWeight: 600, minWidth: 0 }}/>
      {v && <button onClick={() => { if (!controlled) setInternal(''); onChange?.({ target: { value: '' } }); }}
        style={{ background: 'rgba(15,27,54,0.08)', border: 'none', cursor: 'pointer', width: 20, height: 20, borderRadius: 999, display: 'grid', placeItems: 'center' }}>
        <IconClose size={12} color="#4A5773" strokeWidth={2.4}/>
      </button>}
    </div>
  );
}

function Segments({ options, value, onChange }) {
  return (
    <div style={{ display: 'flex', gap: 6 }}>
      {options.map((opt) => {
        const active = opt === value;
        return <button key={opt} onClick={() => onChange?.(opt)} style={{ border: 'none', cursor: 'pointer', fontWeight: 700, fontSize: 13, padding: '8px 16px', borderRadius: 999, background: active ? '#2563EB' : 'transparent', color: active ? '#fff' : '#4A5773', transition: 'all 180ms' }}>{opt}</button>;
      })}
    </div>
  );
}

function NearbyCard({ title, sub, tone = 'blue', faded = false, onClick }) {
  const bgs = { blue: { bg: '#2563EB', fg: '#fff', sub: 'rgba(255,255,255,0.85)' }, coral: { bg: '#FCDBD4', fg: '#E2594A', sub: '#E2594A' }, ghost: { bg: '#EAF1FB', fg: '#143F99', sub: '#4A5773' } };
  const c = bgs[tone] || bgs.blue;
  return (
    <button onClick={onClick} style={{ flex: '0 0 auto', minWidth: 130, textAlign: 'left', background: c.bg, color: c.fg, border: 'none', cursor: onClick ? 'pointer' : 'default', borderRadius: 14, padding: '14px 16px', opacity: faded ? 0.6 : 1, transition: 'transform 140ms' }}
      onMouseDown={(e) => e.currentTarget.style.transform = 'scale(0.97)'}
      onMouseUp={(e) => e.currentTarget.style.transform = 'scale(1)'}
      onMouseLeave={(e) => e.currentTarget.style.transform = 'scale(1)'}>
      <div style={{ fontWeight: 800, fontSize: 14, lineHeight: 1.2 }}>{title}</div>
      <div style={{ fontWeight: 500, fontSize: 12, marginTop: 4, color: c.sub }}>{sub}</div>
    </button>
  );
}

function TabBar({ value, onChange }) {
  const tabs = [{ id: 'map', label: 'Map', Icon: IconMap }, { id: 'friends', label: 'Friends', Icon: IconUsers }, { id: 'events', label: 'Events', Icon: IconCalendar }, { id: 'profile', label: 'Profile', Icon: IconUser }];
  return (
    <div style={{ display: 'flex', justifyContent: 'space-around', alignItems: 'flex-start', padding: '10px 8px 28px', background: '#fff', borderTop: '1px solid #E4EAF2', flexShrink: 0 }}>
      {tabs.map(({ id, label, Icon }) => {
        const active = id === value;
        const color = active ? '#2563EB' : '#8794AE';
        return <button key={id} onClick={() => onChange?.(id)} style={{ background: 'none', border: 'none', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, cursor: 'pointer', padding: '2px 10px', color }}>
          <Icon size={24} color={color} strokeWidth={active ? 2.4 : 2}/><span style={{ fontWeight: active ? 700 : 600, fontSize: 11 }}>{label}</span>
        </button>;
      })}
    </div>
  );
}

function Btn({ children, onClick, tone = 'primary', full = true, disabled, style = {} }) {
  const s = { primary: { bg: '#2563EB', color: '#fff', border: 'none', shadow: '0 4px 12px rgba(37,99,235,0.25)' }, accent: { bg: '#F87060', color: '#fff', border: 'none', shadow: '0 4px 12px rgba(248,112,96,0.25)' }, ghost: { bg: 'transparent', color: '#2563EB', border: '1.5px solid #2563EB', shadow: 'none' } }[tone] || {};
  return (
    <button onClick={onClick} disabled={disabled} style={{ width: full ? '100%' : 'auto', padding: '14px 20px', borderRadius: 14, border: s.border || 'none', background: s.bg, color: s.color, fontWeight: 700, fontSize: 16, boxShadow: s.shadow, opacity: disabled ? 0.55 : 1, cursor: disabled ? 'not-allowed' : 'pointer', transition: 'transform 120ms var(--mm-ease-spring)', ...style }}
      onMouseDown={(e) => !disabled && (e.currentTarget.style.transform = 'scale(0.98)')}
      onMouseUp={(e) => (e.currentTarget.style.transform = 'scale(1)')}
      onMouseLeave={(e) => (e.currentTarget.style.transform = 'scale(1)')}>
      {children}
    </button>
  );
}

function Field({ label, value, onChange, placeholder, type = 'text', Icon }) {
  return (
    <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
      {label && <span style={{ fontWeight: 700, fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: '#4A5773' }}>{label}</span>}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, background: '#fff', border: '1.5px solid #E4EAF2', borderRadius: 12, padding: '13px 14px', transition: 'border-color 160ms' }}
        onFocusCapture={(e) => e.currentTarget.style.borderColor = '#2563EB'}
        onBlurCapture={(e) => e.currentTarget.style.borderColor = '#E4EAF2'}>
        {Icon && <Icon size={18} color="#8794AE"/>}
        <input type={type} value={value || ''} onChange={onChange} placeholder={placeholder}
          style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', fontSize: 15, color: '#0F1B36' }}/>
      </div>
    </label>
  );
}

// fix 4: draggable range slider
function RangeSlider({ value, onChange, min = 2, max = 50 }) {
  const trackRef = useRef(null);
  const dragging = useRef(false);
  const pct = ((value - min) / (max - min)) * 100;

  const getVal = (e) => {
    const rect = trackRef.current.getBoundingClientRect();
    const p = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    return Math.round(min + p * (max - min));
  };
  const onDown = (e) => { dragging.current = true; e.currentTarget.setPointerCapture(e.pointerId); onChange(getVal(e)); };
  const onMove = (e) => { if (dragging.current) onChange(getVal(e)); };
  const onUp   = () => { dragging.current = false; };

  return (
    <div style={{ padding: '8px 0 4px' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 12 }}>
        <span style={{ fontSize: 13, color: '#4A5773' }}>{min} mi</span>
        <span style={{ fontSize: 15, fontWeight: 700, color: '#1E55C7' }}>{value} mi</span>
        <span style={{ fontSize: 13, color: '#4A5773' }}>{max} mi</span>
      </div>
      <div ref={trackRef} onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp}
        style={{ height: 6, background: '#fff', borderRadius: 999, position: 'relative', cursor: 'pointer', touchAction: 'none' }}>
        <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: `${pct}%`, background: '#2563EB', borderRadius: 999 }}/>
        <div style={{ position: 'absolute', left: `calc(${pct}% - 10px)`, top: -7, width: 20, height: 20, borderRadius: '50%', background: '#fff', border: '3px solid #2563EB', boxShadow: '0 2px 6px rgba(37,99,235,0.28)', cursor: 'grab' }}/>
      </div>
    </div>
  );
}

  const mapRef = useRef(null);
  const longPressTimer = useRef(null);
  const dragging = useRef(false);

  const onMapPointerDown = (e) => {
    if (e.button !== 0 && e.pointerType === 'mouse') return;
    const rect = mapRef.current.getBoundingClientRect();
    dragging.current = false;
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    longPressTimer.current = setTimeout(() => {
      dragging.current = true;
      setDragPin({ x, y });
      try { mapRef.current?.setPointerCapture(e.pointerId); } catch {}
    }, 500);
  };
  const onMapPointerMove = (e) => {
    if (!dragging.current) return;
    const rect = mapRef.current.getBoundingClientRect();
    setDragPin({ x: e.clientX - rect.left, y: e.clientY - rect.top });
  };
  const onMapPointerUp = () => {
    clearTimeout(longPressTimer.current);
    if (dragging.current) { dragging.current = false; setDragPin(null); onCreatePin(); }
    else { dragging.current = false; }
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: '#fff', position: 'relative' }}>

            <span style={{ fontSize: 12, color: '#8794AE', flexShrink: 0 }}>{f.time}</span>

        ))}
        {filterKey === 'active' && shownList.length === 0 && (

  { type: 'going',  avatar: 'AR', tone: 'coral', name: 'Aaliyah R.',  body: 'is going to Sunday Park Hangout.',        time: '15m ago' },
  { type: 'pin',    avatar: 'DC', tone: 'blue',  name: 'DeShawn C.',  body: 'dropped a pin: Basketball pickup at Aldrich Park.', time: '30m ago' },
  { type: 'system', avatar: null, tone: 'blue',  name: 'MapMates',    body: '3 people near you share #UrbanSketching.',time: '1h ago' },
  { type: 'system', avatar: null, tone: 'coral', name: 'Reminder',    body: 'Your status expires in 30 minutes.',      time: '2h ago' },
];

function NotificationsScreen({ onBack }) {
  const [dismissed, setDismissed] = useState([]);
  const [accepted, setAccepted] = useState([]);
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: '#fff', animation: 'mm-fade-in 200ms ease' }}>
      <div style={{ background: '#2563EB', padding: '12px 18px 16px', display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0 }}>
        <button onClick={onBack} style={{ background: 'rgba(255,255,255,0.16)', border: 'none', width: 36, height: 36, borderRadius: 999, display: 'grid', placeItems: 'center', cursor: 'pointer' }}>
          <IconChevronLeft size={20} color="#fff"/>
        </button>
        <span style={{ color: '#fff', fontWeight: 700, fontSize: 17 }}>Notifications</span>
      </div>
      <div style={{ flex: 1, overflow: 'auto', padding: '12px 0' }}>
        {NOTIFS_DATA.every((_, i) => dismissed.includes(i)) && (
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '60px 24px', gap: 12 }}>
            <IconBell size={40} color="#B7C7E4"/><span style={{ fontSize: 15, color: '#8794AE' }}>You're all caught up.</span>
          </div>
        )}
        {NOTIFS_DATA.map((n, i) => {
          if (dismissed.includes(i)) return null;
          const firstName = n.name.split(' ')[0];
          return (
            <div key={i} style={{ display: 'flex', gap: 12, padding: '14px 18px', borderBottom: '1px solid #E4EAF2', animation: 'mm-fade-in 200ms ease' }}>
              {n.avatar
                ? <AvatarPin initials={n.avatar} tone={n.tone} size={42}/>
                : <div style={{ width: 42, height: 42, borderRadius: '50%', background: '#EAF1FB', display: 'grid', placeItems: 'center', flexShrink: 0 }}><IconBell size={20} color="#2563EB"/></div>
              }
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 15, lineHeight: 1.4, color: '#0F1B36' }}>
                  <span style={{ fontWeight: 700 }}>{n.name} </span>{n.body}
                </div>
                <div style={{ fontSize: 12, color: '#8794AE', marginTop: 4 }}>{n.time}</div>
                {n.action && !accepted.includes(i) && (
                  <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
                    <button onClick={() => setAccepted((a) => [...a, i])} style={{ background: '#2563EB', border: 'none', color: '#fff', padding: '8px 18px', borderRadius: 999, fontWeight: 700, fontSize: 13, cursor: 'pointer' }}>Accept</button>
                    <button onClick={() => setDismissed((d) => [...d, i])} style={{ background: '#EAF1FB', border: 'none', color: '#4A5773', padding: '8px 18px', borderRadius: 999, fontWeight: 700, fontSize: 13, cursor: 'pointer' }}>Decline</button>
                  </div>
                )}
                {/* fix 2: correct accept copy */}
                {n.action && accepted.includes(i) && (
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 8 }}>
                    <IconCheck size={14} color="#2BB673" strokeWidth={2.5}/>
                    <span style={{ fontSize: 13, color: '#2BB673', fontWeight: 600 }}>You accepted {firstName} as a friend.</span>
                  </div>
                )}
              </div>
              <button onClick={() => setDismissed((d) => [...d, i])} style={{ background: 'none', border: 'none', cursor: 'pointer', alignSelf: 'flex-start', padding: 4 }}>
                <IconClose size={16} color="#8794AE"/>
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────
function App() {
  const [route, setRoute] = useState('login');
  const [tab,   setTab]   = useState('map');
  const [prev,  setPrev]  = useState('map');
  // fix 5: shared status state
  const [userStatus, setUserStatus] = useState({ text: 'Balling at Crypto Arena', hours: 2 });
  // fix 4: shared range value so it persists
  const [rangeVal, setRangeVal] = useState(12);
  // editable profile tags
  const [profileTags, setProfileTags] = useState(['Basketball','Soccer','LiveMusic','BoardGames']);

  const go = (r) => { setPrev(route); setRoute(r); };
  const onTab = (t) => { setTab(t); go(t === 'map' ? 'map' : t === 'friends' ? 'friends' : t === 'events' ? 'events' : 'profile'); };

  // notif handler works from any tab
  const goNotif  = () => go('notif');
  const goProfile = () => { setTab('profile'); go('profile'); };

  let screen;
  switch (route) {
    case 'login':     screen = <LoginScreen onLogin={() => go('map')} onSignup={() => go('signup')}/>; break;
    case 'signup':    screen = <SignUpScreen onContinue={() => go('verify')} onBack={() => go('login')}/>; break;
    case 'verify':    screen = <VerifyScreen onContinue={() => go('tags')}/>; break;
    case 'tags':      screen = <TagsScreen onContinue={() => { go('map'); setTab('map'); }}/>; break;
    case 'map':       screen = <MapScreen tab={tab} onTab={onTab} onOpenPin={() => go('pin')} onCreatePin={() => go('createPin')} onSetStatus={() => go('status')} onNotif={goNotif} onProfile={goProfile}/>; break;
    case 'pin':       screen = <PinDetail onBack={() => go(prev === 'events' ? 'events' : 'map')}/>; break;
    case 'createPin': screen = <CreatePinScreen onCreate={() => go('map')} onCancel={() => go('map')}/>; break;
    case 'status':    screen = (
      <StatusComposeScreen
        initialText={userStatus.text} initialHours={userStatus.hours}
        // fix 5: update shared state on post
        onPost={({ text, hours }) => { setUserStatus({ text, hours }); go('profile'); setTab('profile'); }}
        onCancel={() => go(prev)}
      />
    ); break;
    case 'friends':   screen = <FriendsScreen tab={tab} onTab={onTab} onNotif={goNotif} onProfile={goProfile}/>; break;
    case 'events':    screen = <EventsScreen tab={tab} onTab={onTab} onOpenPin={() => { setPrev('events'); go('pin'); }} onNotif={goNotif} onProfile={goProfile}/>; break;
    case 'profile':   screen = <ProfileScreen tab={tab} onTab={onTab} onStatus={() => go('status')} onNotif={goNotif} onProfile={goProfile} userStatus={userStatus} rangeVal={rangeVal} setRangeVal={setRangeVal} profileTags={profileTags} setProfileTags={setProfileTags}/>; break;
    case 'notif':     screen = <NotificationsScreen onBack={() => go(prev)}/>; break;
    default:          screen = <LoginScreen onLogin={() => go('map')} onSignup={() => go('signup')}/>;
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', minHeight: '100vh', padding: '32px 16px 48px', gap: 20 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14, alignSelf: 'flex-start', maxWidth: 1240, width: '100%' }}>
        <Wordmark size={22} color="#E4EAF2"/>
        <span style={{ color: '#4A5773', fontSize: 13, fontWeight: 600 }}>Platform flow</span>
        <span style={{ color: '#4A5773', fontSize: 12, marginLeft: 'auto' }}>Tap inside the phone · long-press the map to drag-drop a pin</span>
      </div>
      <IOSDevice>
        <IOSStatusBar/>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0 }}>{screen}</div>
      </IOSDevice>
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', justifyContent: 'center', maxWidth: 480 }}>
        {[
          { id: 'login', label: 'Login' }, { id: 'signup', label: 'Sign up' }, { id: 'verify', label: 'Verify' },
          { id: 'tags', label: 'Pick tags' }, { id: 'map', label: 'Map' }, { id: 'pin', label: 'Pin detail' },
          { id: 'createPin', label: 'Drop pin' }, { id: 'status', label: 'Set status' },
          { id: 'friends', label: 'Friends' }, { id: 'events', label: 'Events' },
          { id: 'profile', label: 'Profile' }, { id: 'notif', label: 'Notifications' },
        ].map((r) => (
          <button key={r.id} onClick={() => go(r.id)} style={{ background: route === r.id ? '#2563EB' : 'rgba(255,255,255,0.06)', color: route === r.id ? '#fff' : '#8794AE', border: '1px solid ' + (route === r.id ? '#2563EB' : 'rgba(255,255,255,0.10)'), padding: '6px 12px', borderRadius: 999, cursor: 'pointer', fontWeight: 700, fontSize: 12, transition: 'all 160ms' }}>
            {r.label}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
